services:
  # Lead node — aggregates entities from all 4 building nodes.
  # Exposes port 8080 to the host. Has its own demo data plus federated data.
  lead:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - RUST_LOG=info
    command:
      - serve
      - --port
      - "8080"
      - --demo
      - --users
      - /data/users.toml
      - --federation
      - /data/federation.toml
    ports:
      - "8080:8080"
    volumes:
      - ./users.toml:/data/users.toml:ro
      - ./federation.toml:/data/federation.toml:ro
    networks:
      - haystack
    depends_on:
      - node-1
      - node-2
      - node-3
      - node-4

  # Building A — standalone node with demo data.
  node-1:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - serve
      - --port
      - "8080"
      - --demo
      - --users
      - /data/users.toml
    volumes:
      - ./users.toml:/data/users.toml:ro
    networks:
      - haystack

  # Building B
  node-2:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - serve
      - --port
      - "8080"
      - --demo
      - --users
      - /data/users.toml
    volumes:
      - ./users.toml:/data/users.toml:ro
    networks:
      - haystack

  # Building C
  node-3:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - serve
      - --port
      - "8080"
      - --demo
      - --users
      - /data/users.toml
    volumes:
      - ./users.toml:/data/users.toml:ro
    networks:
      - haystack

  # Building D
  node-4:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - serve
      - --port
      - "8080"
      - --demo
      - --users
      - /data/users.toml
    volumes:
      - ./users.toml:/data/users.toml:ro
    networks:
      - haystack

networks:
  haystack:
    driver: bridge
